name: oxlint

on:
  workflow_call:

permissions: {}

jobs:
  oxlint:
    name: oxlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: npm:oxlint@1.74.0
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.7 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run oxlint
        run: mise x "$TOOL" -- oxlint
