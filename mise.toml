[tools]
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:suzuki-shunsuke/ghalint" = "1.5.6"
"aqua:zizmorcore/zizmor" = "1.27.0"
"aqua:betterleaks/betterleaks" = "1.6.1"
"aqua:trufflesecurity/trufflehog" = "3.95.9"
"aqua:nodejs/node" = "24.18.0" # runtime for the npm-backed tools below
# aqua has native binaries (oxc apps_v) but our pinned mise's baked registry can't resolve them yet, so use npm
"npm:oxlint" = "1.74.0"
"npm:oxfmt" = "0.59.0"

[settings]
lockfile = true
locked = true
minimum_release_age = "3d"
