name: Renovate Config

on:
  workflow_call:

permissions: {}

jobs:
  renovate-config-validator:
    name: renovate-config-validator
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: npm:renovate@43.273.0
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.11 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run renovate-config-validator
        # mise x pins the tool version without requiring it in the caller's mise config.
        run: mise x "$TOOL" -- renovate-config-validator --strict
