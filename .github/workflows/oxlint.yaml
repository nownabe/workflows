name: oxlint

on:
  workflow_call:

permissions: {}

jobs:
  oxlint:
    name: oxlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install_args: npm:oxlint@1.69.0
      - name: Run oxlint
        run: oxlint
