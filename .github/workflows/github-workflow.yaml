name: GitHub Workflow

on:
  workflow_call:

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: aqua:rhysd/actionlint@1.7.12
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.7 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run actionlint
        # shellcheck is preinstalled on the runner and used for embedded run scripts.
        # mise x pins the tool version without requiring it in the caller's mise config.
        run: mise x "$TOOL" -- actionlint -color

  ghalint:
    name: ghalint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: aqua:suzuki-shunsuke/ghalint@1.5.6
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.7 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run ghalint
        run: mise x "$TOOL" -- ghalint run

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: aqua:zizmorcore/zizmor@1.25.2
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.7 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run zizmor
        run: mise x "$TOOL" -- zizmor --offline .github/workflows
