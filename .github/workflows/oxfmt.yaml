name: oxfmt

on:
  workflow_call:

permissions: {}

jobs:
  oxfmt:
    name: oxfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: npm:oxfmt@0.54.0
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          version: 2026.7.0 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Check formatting
        run: mise x "$TOOL" -- oxfmt --check
