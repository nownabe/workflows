name: GitHub Workflow

on:
  workflow_call:

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: aqua:rhysd/actionlint@1.7.12
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install_args: ${{ env.TOOL }}
      - name: Run actionlint
        # shellcheck is preinstalled on the runner and used for embedded run scripts.
        # mise x pins the tool version without requiring it in the caller's mise config.
        run: mise x "$TOOL" -- actionlint -color

  ghalint:
    name: ghalint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: aqua:suzuki-shunsuke/ghalint@1.5.6
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install_args: ${{ env.TOOL }}
      - name: Run ghalint
        run: mise x "$TOOL" -- ghalint run

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      TOOL: aqua:zizmorcore/zizmor@1.25.2
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install_args: ${{ env.TOOL }}
      - name: Run zizmor
        run: mise x "$TOOL" -- zizmor --offline .github/workflows
