name: Pull Request Checks

on:
  workflow_call:

permissions: {}

jobs:
  filter:
    name: Filter
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      changes: ${{ toJSON(steps.filter.outputs) }}
    steps:
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          filters: |
            github_workflow:
              - '.github/workflows/**'
            oxfmt:
              - '**/*.{ts,tsx,js,jsx,mts,cts,mjs,cjs}'
              - '**/*.{json,jsonc,json5}'
              - '**/*.{css,scss,less}'
              - '**/*.{yaml,yml,toml}'
              - '**/*.{html,vue,graphql}'
              - '**/*.{md,mdx}'
              - '.oxfmtrc*'
            oxlint:
              - '**/*.{ts,tsx,js,jsx,mts,cts,mjs,cjs}'
              - '.oxlintrc*'
              - 'oxlint.config.*'
            renovate_config:
              - 'renovate.json5'
              - 'renovate.json'
              - '.renovaterc*'
              - '.github/renovate.json5'
              - '.github/renovate.json'
            shellcheck:
              - '**/*.sh'

  github-workflow:
    name: GitHub Workflow
    needs: filter
    if: ${{ fromJSON(needs.filter.outputs.changes).github_workflow == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/github-workflow.yaml

  oxfmt:
    name: oxfmt
    needs: filter
    if: ${{ fromJSON(needs.filter.outputs.changes).oxfmt == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/oxfmt.yaml

  oxlint:
    name: oxlint
    needs: filter
    if: ${{ fromJSON(needs.filter.outputs.changes).oxlint == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/oxlint.yaml

  renovate-config:
    name: Renovate Config
    needs: filter
    if: ${{ fromJSON(needs.filter.outputs.changes).renovate_config == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/renovate-config.yaml

  shellcheck:
    name: shellcheck
    needs: filter
    if: ${{ fromJSON(needs.filter.outputs.changes).shellcheck == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/shellcheck.yaml

  secret-scan:
    name: Secret Scan
    permissions:
      contents: read
    uses: ./.github/workflows/secret-scan.yaml

  result:
    name: Result
    if: always()
    needs:
      - github-workflow
      - oxfmt
      - oxlint
      - renovate-config
      - shellcheck
      - secret-scan
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check job results
        env:
          HAS_FAILURE: ${{ contains(needs.*.result, 'failure') }}
          HAS_CANCELLED: ${{ contains(needs.*.result, 'cancelled') }}
        run: '[[ "$HAS_FAILURE" == "false" && "$HAS_CANCELLED" == "false" ]]'
