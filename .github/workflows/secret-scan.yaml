name: Secret Scan

on:
  workflow_call:

permissions: {}

jobs:
  betterleaks:
    name: betterleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TOOL: aqua:betterleaks/betterleaks@1.6.1
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.7 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run betterleaks
        run: mise x "$TOOL" -- betterleaks git .

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TOOL: aqua:trufflesecurity/trufflehog@3.95.9
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.7 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run trufflehog
        run: mise x "$TOOL" -- trufflehog git file://. --results=verified --fail --no-update
