name: Secret Scan

on:
  workflow_call:

permissions: {}

jobs:
  betterleaks:
    name: betterleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TOOL: aqua:betterleaks/betterleaks@1.6.1
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4
        with:
          version: 2026.7.11 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run betterleaks
        run: mise x "$TOOL" -- betterleaks git .

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TOOL: aqua:trufflesecurity/trufflehog@3.95.9
      # Ignore the caller repo's locked/lockfile mise settings; the tool version is pinned in TOOL.
      MISE_LOCKED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4
        with:
          version: 2026.7.11 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run trufflehog
        run: mise x "$TOOL" -- trufflehog git file://. --results=verified --fail --no-update
