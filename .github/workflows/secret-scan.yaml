name: Secret Scan

on:
  workflow_call:

permissions: {}

jobs:
  betterleaks:
    name: betterleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TOOL: aqua:betterleaks/betterleaks@1.5.0
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          version: 2026.7.0 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run betterleaks
        run: mise x "$TOOL" -- betterleaks git .

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TOOL: aqua:trufflesecurity/trufflehog@3.95.5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          version: 2026.7.0 # renovate:mise-version
          install_args: ${{ env.TOOL }}
      - name: Run trufflehog
        run: mise x "$TOOL" -- trufflehog git file://. --results=verified --fail --no-update
